<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniTool - 迷你在线工具箱</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --primary-light: #818cf8;
  --accent: #f59e0b;
  --bg: #0f0f13;
  --bg2: #13131c;
  --surface: #1a1a24;
  --surface2: #22223a;
  --border: #2d2d4a;
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --success: #22c55e;
  --danger: #ef4444;
  --radius: 14px;
  --radius-sm: 8px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary); }

/* ── Header ── */
.header {
  background: rgba(15,15,19,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 0 24px;
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 20px;
  height: 64px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}
.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 800;
  font-size: 16px;
}
.logo-text {
  font-size: 20px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary-light), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-search {
  flex: 1;
  max-width: 480px;
  position: relative;
}
.header-search input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 8px 16px 8px 40px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.header-search input:focus { border-color: var(--primary); }
.header-search input::placeholder { color: var(--text-muted); }
.header-search .search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
}
.header-badge {
  margin-left: auto;
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.header-badge span {
  background: rgba(34,197,94,0.15);
  color: var(--success);
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 600;
}

/* ── Hero ── */
.hero {
  padding: 56px 24px 40px;
  text-align: center;
  position: relative;
}
.hero::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 400px;
  background: radial-gradient(ellipse, rgba(99,102,241,0.15) 0%, transparent 70%);
  pointer-events: none;
}
.hero h1 {
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 800;
  line-height: 1.15;
  margin-bottom: 12px;
}
.hero h1 .highlight {
  background: linear-gradient(135deg, var(--primary-light), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero p {
  color: var(--text-muted);
  font-size: 16px;
  max-width: 500px;
  margin: 0 auto 28px;
  line-height: 1.6;
}
.hero-stats {
  display: flex;
  justify-content: center;
  gap: 32px;
  flex-wrap: wrap;
}
.stat-item {
  text-align: center;
}
.stat-item .num {
  font-size: 22px;
  font-weight: 800;
  color: var(--primary-light);
}
.stat-item .label {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ── Category Tabs ── */
.tabs-wrap {
  padding: 0 24px;
  max-width: 1200px;
  margin: 0 auto;
}
.tabs {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 4px;
  overflow-x: auto;
  border: 1px solid var(--border);
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  font-family: inherit;
}
.tab-btn:hover { color: var(--text); background: var(--surface2); }
.tab-btn.active {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  box-shadow: 0 4px 16px rgba(99,102,241,0.35);
}
.tab-btn .count {
  font-size: 11px;
  background: rgba(255,255,255,0.15);
  padding: 1px 7px;
  border-radius: 10px;
}
.tab-btn:not(.active) .count {
  background: var(--border);
}

/* ── Tools Grid ── */
.main-content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 28px 24px 60px;
}
.tools-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}
.tool-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}
.tool-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  opacity: 0;
  transition: opacity 0.25s;
}
.tool-card:hover {
  border-color: var(--primary);
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(99,102,241,0.2);
}
.tool-card:hover::before { opacity: 0.05; }
.tool-card-inner {
  position: relative;
  z-index: 1;
}
.tool-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  font-size: 20px;
}
.tool-card h3 {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--text);
}
.tool-card p {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.5;
}
.tool-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 6px;
  margin-top: 10px;
}

/* Tool category colors */
.tool-card[data-cat="pdf"] .tool-icon { background: rgba(239,68,68,0.15); color: #ef4444; }
.tool-card[data-cat="pdf"] .tool-tag { background: rgba(239,68,68,0.1); color: #ef4444; }
.tool-card[data-cat="image"] .tool-icon { background: rgba(34,197,94,0.15); color: #22c55e; }
.tool-card[data-cat="image"] .tool-tag { background: rgba(34,197,94,0.1); color: #22c55e; }
.tool-card[data-cat="video"] .tool-icon { background: rgba(245,158,11,0.15); color: #f59e0b; }
.tool-card[data-cat="video"] .tool-tag { background: rgba(245,158,11,0.1); color: #f59e0b; }
.tool-card[data-cat="ai"] .tool-icon { background: rgba(99,102,241,0.15); color: #818cf8; }
.tool-card[data-cat="ai"] .tool-tag { background: rgba(99,102,241,0.1); color: #818cf8; }

/* ── Workspace Modal ── */
.workspace-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  z-index: 200;
  overflow-y: auto;
  padding: 20px;
}
.workspace-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

.workspace {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  width: 100%;
  max-width: 720px;
  margin: 24px 0;
  overflow: hidden;
  animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.workspace-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.workspace-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.workspace-title h2 {
  font-size: 17px;
  font-weight: 700;
}
.workspace-title p {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}
.workspace-close {
  margin-left: auto;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--surface2);
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.workspace-close:hover { background: var(--danger); color: white; }

.workspace-body { padding: 24px; }

/* ── Drop Zone ── */
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 48px 24px;
  text-align: center;
  transition: all 0.25s;
  cursor: pointer;
  background: var(--surface);
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--primary);
  background: rgba(99,102,241,0.05);
}
.drop-zone input[type="file"] {
  display: none;
}
.drop-zone-icon {
  color: var(--text-muted);
  margin-bottom: 12px;
}
.drop-zone h3 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 6px;
}
.drop-zone p {
  font-size: 13px;
  color: var(--text-muted);
}
.drop-zone .formats {
  margin-top: 10px;
  display: flex;
  gap: 6px;
  justify-content: center;
  flex-wrap: wrap;
}
.format-chip {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--surface2);
  color: var(--text-muted);
}

/* ── File Preview ── */
.file-preview {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-top: 16px;
  display: none;
}
.file-preview.show { display: block; }
.file-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.file-item:last-child { border-bottom: none; }
.file-item .fi-icon { color: var(--primary-light); flex-shrink: 0; }
.file-item .fi-name { flex: 1; font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-item .fi-size { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
.file-item .fi-remove {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.file-item .fi-remove:hover { background: var(--danger); color: white; }
.clear-btn {
  margin-top: 10px;
  width: 100%;
  padding: 8px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.clear-btn:hover { border-color: var(--danger); color: var(--danger); }

/* ── Controls ── */
.controls {
  margin-top: 20px;
  display: none;
}
.controls.show { display: block; }
.control-row {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.control-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  min-width: 80px;
}
input[type="text"], input[type="number"], select, textarea {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
input:focus, select:focus, textarea:focus { border-color: var(--primary); }
textarea {
  width: 100%;
  min-height: 120px;
  resize: vertical;
  line-height: 1.6;
}
select { cursor: pointer; }
input[type="range"] {
  -webkit-appearance: none;
  width: 140px;
  height: 4px;
  border-radius: 2px;
  background: var(--border);
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--primary);
  cursor: pointer;
}
.range-val {
  font-size: 13px;
  font-weight: 600;
  color: var(--primary-light);
  min-width: 36px;
}
.btn-row {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  flex-wrap: wrap;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 22px;
  border-radius: var(--radius-sm);
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  flex: 1;
  justify-content: center;
}
.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  box-shadow: 0 4px 14px rgba(99,102,241,0.35);
}
.btn-primary:hover { box-shadow: 0 6px 20px rgba(99,102,241,0.5); transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-secondary {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--primary); color: var(--primary-light); }
.btn-danger {
  background: rgba(239,68,68,0.1);
  color: var(--danger);
  border: 1px solid rgba(239,68,68,0.3);
}

/* ── Progress ── */
.progress-wrap {
  display: none;
  margin-top: 16px;
}
.progress-wrap.show { display: block; }
.progress-bar-bg {
  background: var(--surface);
  border-radius: 8px;
  height: 8px;
  overflow: hidden;
  margin-bottom: 8px;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  border-radius: 8px;
  transition: width 0.3s;
  width: 0%;
}
.progress-text {
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
}

/* ── Output ── */
.output-area {
  display: none;
  margin-top: 20px;
  background: var(--surface);
  border: 1px solid var(--success);
  border-radius: var(--radius);
  padding: 20px;
}
.output-area.show { display: block; animation: slideUp 0.3s; }
.output-area h4 {
  font-size: 14px;
  font-weight: 700;
  color: var(--success);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.output-result {
  font-size: 13px;
  line-height: 1.7;
  color: var(--text);
  white-space: pre-wrap;
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 14px;
  max-height: 300px;
  overflow-y: auto;
}

/* Image Preview Grid */
.img-preview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
  margin-top: 12px;
}
.img-preview-item {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  aspect-ratio: 1;
  background: var(--surface2);
}
.img-preview-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.img-preview-item canvas {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* ── Toast ── */
.toast-container {
  position: fixed;
  top: 80px;
  right: 20px;
  z-index: 500;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: toastIn 0.3s ease;
  pointer-events: all;
  max-width: 320px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}
.toast-success { background: rgba(34,197,94,0.95); color: white; }
.toast-error { background: rgba(239,68,68,0.95); color: white; }
.toast-info { background: rgba(99,102,241,0.95); color: white; }

/* ── Footer ── */
.footer {
  text-align: center;
  padding: 32px 24px;
  color: var(--text-muted);
  font-size: 12px;
  border-top: 1px solid var(--border);
  margin-top: 40px;
}
.footer a { color: var(--primary-light); text-decoration: none; }

/* ── Section Title ── */
.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Signature Canvas */
.sig-canvas-wrap {
  display: none;
  margin-top: 14px;
}
.sig-canvas-wrap.show { display: block; }
.sig-canvas {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: white;
  cursor: crosshair;
  touch-action: none;
  max-width: 100%;
}
.sig-actions { display: flex; gap: 8px; margin-top: 8px; }

/* Responsive */
@media (max-width: 640px) {
  .header-inner { padding: 0; gap: 10px; }
  .header-badge { display: none; }
  .hero { padding: 36px 16px 28px; }
  .hero h1 { font-size: 26px; }
  .tools-grid { grid-template-columns: 1fr 1fr; }
  .workspace { border-radius: 16px; }
  .workspace-body { padding: 16px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <a href="#" class="logo" onclick="location.reload()">
      <div class="logo-icon">M</div>
      <span class="logo-text">MiniTool</span>
    </a>
    <div class="header-search">
      <i data-lucide="search" class="search-icon" style="width:16px;height:16px"></i>
      <input type="text" placeholder="搜索工具..." id="searchInput" oninput="filterTools()">
    </div>
    <div class="header-badge">
      <i data-lucide="shield-check" style="width:14px;height:14px;color:var(--success)"></i>
      <span>本地处理 · 隐私安全</span>
    </div>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <h1>你的文件处理<span class="highlight">瑞士军刀</span></h1>
  <p>PDF、图片、视频、AI写作 — 全部免费，无需注册，数据全程本地处理，绝不外传。</p>
  <div class="hero-stats">
    <div class="stat-item"><div class="num">30+</div><div class="label">精选工具</div></div>
    <div class="stat-item"><div class="num">100%</div><div class="label">免费使用</div></div>

  { id: 'vid_thumb',      cat: 'video', icon: 'image',            name: '视频封面提取',   desc: '从视频中截取一帧作为图片',     formats: ['.mp4','.webm','.mov','.avi'], hasControls: true },
  { id: 'vid_unwatermark',cat: 'video', icon: 'eraser',           name: '视频去水印',     desc: '涂抹移除视频水印/Logo区域',   formats: ['.mp4','.webm','.mov'], hasControls: false },

  { id: 'ai_polish',      cat: 'ai',    icon: 'wand-2',           name: '文字润色',       desc: 'AI优化文字表达，更流畅专业',    formats: ['text'],           hasControls: false },
  { id: 'ai_continue',    cat: 'ai',    icon: 'corner-down-right',name: '文章续写',       desc: '输入开头，AI续写完整内容',     formats: ['text'],           hasControls: false },
  { id: 'ai_title',       cat: 'ai',    icon: 'type',             name: '标题生成',       desc: '输入文章内容，生成吸睛标题',   formats: ['text'],           hasControls: false },
  { id: 'ai_summary',    cat: 'ai',    icon: 'align-left',       name: '摘要总结',       desc: '输入长文，生成精炼摘要',       formats: ['text'],           hasControls: false },
  { id: 'ai_marketing',   cat: 'ai',    icon: 'megaphone',        name: '营销文案',       desc: '输入产品信息，生成推广文案',   formats: ['text'],           hasControls: false },
];

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let currentTool = null;
let uploadedFiles = [];
let sigPoints = [];
let isDrawingSig = false;

// ─────────────────────────────────────────────
// RENDER TOOLS
// ─────────────────────────────────────────────
function renderTools(category = 'all') {
  const container = document.getElementById('toolsContainer');
  const filtered = category === 'all' ? TOOLS : TOOLS.filter(t => t.cat === category);
  const cats = category === 'all' ? ['pdf','image','video','ai'] : [category];
  let html = '';

  cats.forEach(cat => {
    const catTools = filtered.filter(t => t.cat === cat);
    if (!catTools.length) return;
    const catNames = { pdf:'PDF工具', image:'图片工具', video:'视频工具', ai:'AI写作' };
    const catIcons = { pdf:'file-text', image:'image', video:'video', ai:'sparkles' };
    html += `<div class="section-title"><i data-lucide="${catIcons[cat]}" style="width:14px;height:14px"></i> ${catNames[cat]}</div>`;
    html += `<div class="tools-grid" data-cat="${cat}">`;
    catTools.forEach(tool => {
      html += `
      <div class="tool-card" data-cat="${tool.cat}" data-id="${tool.id}" onclick="openTool('${tool.id}')">
        <div class="tool-card-inner">
          <div class="tool-icon"><i data-lucide="${tool.icon}" style="width:22px;height:22px"></i></div>
          <h3>${tool.name}</h3>
          <p>${tool.desc}</p>
          <span class="tool-tag">${tool.formats[0] === 'text' ? '文字' : tool.formats.map(f=>f.replace('.','')).join('/')}</span>
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  container.innerHTML = html;
  lucide.createIcons();
}

function switchTab(cat) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  renderTools(cat);
}

function filterTools() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.tool-card').forEach(card => {
    const name = card.querySelector('h3').textContent.toLowerCase();
    const desc = card.querySelector('p').textContent.toLowerCase();
    card.style.display = (name.includes(q) || desc.includes(q)) ? '' : 'none';
  });
}

// ─────────────────────────────────────────────
// WORKSPACE
// ─────────────────────────────────────────────
function openTool(id) {
  currentTool = TOOLS.find(t => t.id === id);
  if (!currentTool) return;

  document.getElementById('wsTitle').textContent = currentTool.name;
  document.getElementById('wsDesc').textContent = currentTool.desc;

  const catColors = { pdf:'rgba(239,68,68,0.15)', image:'rgba(34,197,94,0.15)', video:'rgba(245,158,11,0.15)', ai:'rgba(99,102,241,0.15)' };
  const catIcons = { pdf:'file-text', image:'image', video:'video', ai:'sparkles' };
  const catColor2 = { pdf:'#ef4444', image:'#22c55e', video:'#f59e0b', ai:'#818cf8' };
  const wsIcon = document.getElementById('wsIcon');
  wsIcon.style.background = catColors[currentTool.cat];
  wsIcon.innerHTML = `<i data-lucide="${catIcons[currentTool.cat]}" style="width:20px;height:20px;color:${catColor2[currentTool.cat]}"></i>`;

  // Format chips
  const formatChips = document.getElementById('formatChips');
  if (currentTool.formats[0] === 'text') {
    formatChips.innerHTML = '<span class="format-chip">纯文字输入</span>';
  } else {
    formatChips.innerHTML = currentTool.formats.map(f => `<span class="format-chip">${f}</span>`).join('');
  }

  // Setup controls
  setupControls(currentTool);

  // Reset state
  clearFiles();
  document.getElementById('progressWrap').classList.remove('show');
  document.getElementById('outputArea').classList.remove('show');
  document.getElementById('imgPreviewGrid').innerHTML = '';
  document.getElementById('sigCanvasWrap').classList.remove('show');

  // Show workspace
  document.getElementById('workspaceOverlay').classList.add('open');
  lucide.createIcons();
}

function closeWorkspace() {
  document.getElementById('workspaceOverlay').classList.remove('open');
  currentTool = null;
  clearFiles();
}

// ─────────────────────────────────────────────
// FILE UPLOAD
// ─────────────────────────────────────────────
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(fileList) {
  if (!currentTool) return;
  for (const file of fileList) {
    const ext = '.' + file.name.split('.').pop().toLowerCase();
    const allowed = currentTool.formats;
    if (allowed[0] === 'text') {
      // AI tools don't need files
    } else if (!allowed.includes(ext)) {
      toast(`${file.name} 格式不支持，请选择 ${allowed.join(',')}`, 'error');
      continue;
    }
    uploadedFiles.push(file);
  }
  renderFileList();
  showControls();
}

function renderFileList() {
  const preview = document.getElementById('filePreview');
  const list = document.getElementById('fileList');
  if (!uploadedFiles.length) {
    preview.classList.remove('show');
    return;
  }
  preview.classList.add('show');
  list.innerHTML = uploadedFiles.map((f, i) => `
    <div class="file-item">
      <div class="fi-icon"><i data-lucide="file" style="width:18px;height:18px"></i></div>
      <div class="fi-name">${f.name}</div>
      <div class="fi-size">${formatSize(f.size)}</div>
      <button class="fi-remove" onclick="removeFile(${i})"><i data-lucide="x" style="width:12px;height:12px"></i></button>
    </div>
  `).join('');
  lucide.createIcons();
}

function removeFile(idx) {
  uploadedFiles.splice(idx, 1);
  renderFileList();
  showControls();
}

function clearFiles() {
  uploadedFiles = [];
  fileInput.value = '';
  renderFileList();
  document.getElementById('controls').classList.remove('show');
  document.getElementById('btnRow').style.display = 'none';
  document.getElementById('progressWrap').classList.remove('show');
  document.getElementById('outputArea').classList.remove('show');
  document.getElementById('imgPreviewGrid').innerHTML = '';
  sigPoints = [];
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

// ─────────────────────────────────────────────
// CONTROLS
// ─────────────────────────────────────────────
function setupControls(tool) {
  const ctrl = document.getElementById('controls');

  document.getElementById('btnRow').style.display = 'none';

    ctrl.innerHTML = `

    document.getElementById('btnRow').style.display = 'flex';

      document.getElementById('btnRow').style.display = 'flex';

          <option value="180">180°</option>
          <option value="270">逆时针 90°</option>

      break;

      break;

      html = `<div class="control-row"><span class="control-label">输出格式</span>
        <select id="ctrlFormat" style="flex:1">

    case 'img_resize':
      html = `<div class="control-row">
          <span class="control-label">宽度(px)</span><input type="number" id="ctrlW" value="800" min="1" style="width:90px">

      break;
    case 'img_rotate':
      html = `<div class="control-row"><span class="control-label">旋转角度</span>
        <select id="ctrlRotate" style="flex:1">
          <option value="90">顺时针 90°</option>

// ─── PDF Tools ───
async function toolPdfMerge() {
  const { PDFDocument } = PDFLib;
  const mergedPdf = await PDFDocument.create();
  for (const file of uploadedFiles) {
    const buf = await file.arrayBuffer();
    const pdf = await PDFDocument.load(buf);
    const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
    pages.forEach(p => mergedPdf.addPage(p));
  }
  const bytes = await mergedPdf.save();
  saveBlob(new Blob([bytes], {type:'application/pdf'}), 'merged.pdf');
  hideProgress();
  showOutput('合并成功！已生成合并后的PDF文件。');
}

async function toolPdfSplit() {
  const { PDFDocument } = PDFLib;
  const ranges = parsePageRanges(document.getElementById('ctrlPages').value);
  const file = uploadedFiles[0];
  const buf = await file.arrayBuffer();
  const pdf = await PDFDocument.load(buf);
  const total = pdf.getPageCount();
  const zip = new JSZip();

  for (const range of ranges) {
    for (let i = range.start; i <= Math.min(range.end, total); i++) {
      const newPdf = await PDFDocument.create();
      const [page] = await newPdf.copyPages(pdf, [i-1]);
      newPdf.addPage(page);
      const bytes = await newPdf.save();
      zip.file(`page_${i}.pdf`, bytes);
    }
  }
  const blob = await zip.generateAsync({ type: 'blob' });
  saveBlob(blob, 'split_pages.zip');
  hideProgress();
  showOutput('拆分完成！共生成 ' + (ranges.reduce((s,r)=>s+r.end-r.start+1,0)) + ' 个PDF文件，已打包为ZIP。');
}

async function toolPdfToJpg() {
  // Use pdf-lib + canvas for rendering (client-side PDF→image)
  const file = uploadedFiles[0];
  const buf = await file.arrayBuffer();
  // Load PDF.js dynamically
  if (!window.pdfjsLib) {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    document.head.appendChild(script);
    await new Promise(r => script.onload = r);
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  const pdf = await window.pdfjsLib.getDocument({data: buf.slice(0)}).promise;
  const zip = new JSZip();
  const scale = 2; // High quality

  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const vp = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width = vp.width; canvas.height = vp.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
    const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.92));
    zip.file(`page_${i}.jpg`, blob);
  }

  const zblob = await zip.generateAsync({ type: 'blob' });
  saveBlob(zblob, 'pdf_pages.zip');
  hideProgress();
  showOutput(`转换完成！PDF共 ${pdf.numPages} 页，已转为JPG图片并打包。`);
}

async function toolJpgToPdf() {
  const { PDFDocument } = PDFLib;
  const pdf = await PDFDocument.create();
  for (const file of uploadedFiles) {
    const buf = await file.arrayBuffer();
    const ext = file.name.split('.').pop().toLowerCase();
    let img;
    if (ext === 'png') {
      img = await pdf.embedPng(buf);
    } else {
      img = await pdf.embedJpg(buf);
    }
    const page = pdf.addPage([img.width, img.height]);
    page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
  }
  const bytes = await pdf.save();
  saveBlob(new Blob([bytes], {type:'application/pdf'}), 'converted.pdf');
  hideProgress();
  showOutput('转换完成！已将 ' + uploadedFiles.length + ' 张图片合并为PDF。');
}

async function toolPdfSign() {

function initSignatureCanvas() {
  const canvas = document.getElementById('sigCanvas');
  const ctx = canvas.getContext('2d');
  ctx.strokeStyle = '#1a1a24';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  sigPoints = [];

  canvas.onmousedown = e => { isDrawingSig = true; sigPoints = []; ctx.clearRect(0,0,canvas.width,canvas.height); };
  canvas.onmousemove = e => {
    if (!isDrawingSig) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    sigPoints.push({x,y});
    if (sigPoints.length > 1) {
      ctx.beginPath();
      ctx.moveTo(sigPoints[sigPoints.length-2].x, sigPoints[sigPoints.length-2].y);
      ctx.lineTo(x, y);
      ctx.stroke();
    }
  };
  canvas.onmouseup = () => isDrawingSig = false;
  canvas.onmouseleave = () => isDrawingSig = false;
}

function clearSignature() {
  const canvas = document.getElementById('sigCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  sigPoints = [];
}

async function confirmSignature() {
  const canvas = document.getElementById('sigCanvas');
  if (sigPoints.length < 2) { toast('请先签名', 'error'); return; }
  const sigBlob = await new Promise(r => canvas.toBlob(r, 'image/png'));
  const { PDFDocument, rgb } = PDFLib;
  const file = uploadedFiles[0];
  const buf = await file.arrayBuffer();
  const pdf = await PDFDocument.load(buf);
  const sigImg = await pdf.embedPng(await sigBlob.arrayBuffer());
  const pages = pdf.getPages();
  const lastPage = pages[pages.length - 1];
  const { width, height } = lastPage.getSize();
  const sigW = Math.min(sigImg.width, width * 0.4);
  const sigH = sigImg.height * (sigW / sigImg.width);
  lastPage.drawImage(sigImg, {
    x: width - sigW - 40,
    y: 40,
    width: sigW,
    height: sigH
  });
  // Draw "Signed" text
  lastPage.drawText('✓ Signed via MiniTool', {
    x: width - sigW - 40,
    y: 30,
    size: 10,
    color: rgb(0.4, 0.4, 0.4)
  });
  const bytes = await pdf.save();
  saveBlob(new Blob([bytes], {type:'application/pdf'}), 'signed.pdf');
  hideProgress();
  document.getElementById('sigCanvasWrap').classList.remove('show');
  showOutput('签名已嵌入PDF最后一页！');
}

async function toolPdfExtract() {

async function toolImgCompress() {

  const zip = new JSZip();

  for (const file of uploadedFiles) {
    const img = await loadImage(file);

async function toolImgConvert() {

async function toolImgResize() {
  const w = parseInt(document.getElementById('ctrlW').value) || 800;
  const h = parseInt(document.getElementById('ctrlH').value) || 600;
  const lock = document.getElementById('ctrlLockRatio')?.checked ?? true;
  const zip = new JSZip();
  let count = 0;
  for (const file of uploadedFiles) {
    const img = await loadImage(file);
    const canvas = document.createElement('canvas');
    let nw = w, nh = h;
    if (lock) {
      const ratio = img.naturalWidth / img.naturalHeight;
      if (w / h > ratio) nw = Math.round(h * ratio);
      else nh = Math.round(w / ratio);
    }
    canvas.width = nw; canvas.height = nh;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, nw, nh);
    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
    zip.file(file.name.replace(/\.[^.]+$/, '_resized.png'), blob);
    count++;
  }
  const zblob = await zip.generateAsync({ type: 'blob' });
  saveBlob(zblob, 'resized_images.zip');
  hideProgress();
  showOutput(`尺寸调整完成！输出尺寸: ${w}×${h}px（锁定比例模式）`);
}

async function toolImgCrop() {
  // For client-side crop, we'll open a simple overlay
  toast('裁剪功能：请在下方预览中使用鼠标拖拽选择区域', 'info');
  const file = uploadedFiles[0];
  const img = await loadImage(file);

  hint.style.cssText = 'color:white;margin-bottom:12px;font-size:14px;text-align:center';
  hint.textContent = '拖拽鼠标在图片上选择裁剪区域，然后点击"确认裁剪"';
  
  const canvasWrap = document.createElement('div');
  canvasWrap.style.cssText = 'position:relative;display:inline-block;max-width:90vw;max-height:70vh;overflow:hidden;border-radius:8px;';
  
  const cvs = document.createElement('canvas');
  cvs.width = img.naturalWidth; cvs.height = img.naturalHeight;
  const ctx = cvs.getContext('2d');
  ctx.drawImage(img, 0, 0);
  
  const sel = { x:0, y:0, w: img.naturalWidth, h: img.naturalHeight, dragging:false };
  
  // Overlay rect
  const rectDiv = document.createElement('div');
  rectDiv.style.cssText = 'position:absolute;border:2px dashed white;background:rgba(99,102,241,0.2);pointer-events:none;left:0;top:0;right:0;bottom:0;';
  canvasWrap.appendChild(cvs);
  
  const maskDiv = document.createElement('div');
  maskDiv.style.cssText = 'position:absolute;inset:0;background:rgba(0,0,0,0.5);';
  canvasWrap.appendChild(maskDiv);
  canvasWrap.appendChild(rectDiv);
  
  // Selection box drawing
  let selStart = null;
  canvasWrap.addEventListener('mousedown', e => {
    const rect = cvs.getBoundingClientRect();
    const scaleX = cvs.width / rect.width;
    const scaleY = cvs.height / rect.height;
    selStart = { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
  });
  canvasWrap.addEventListener('mouseup', e => {
    if (!selStart) return;
    const rect = cvs.getBoundingClientRect();
    const scaleX = cvs.width / rect.width;
    const scaleY = cvs.height / rect.height;
    const ex = (e.clientX - rect.left) * scaleX;
    const ey = (e.clientY - rect.top) * scaleY;
    const x = Math.min(selStart.x, ex);
    const y = Math.min(selStart.y, ey);
    const w = Math.abs(ex - selStart.x);
    const h = Math.abs(ey - selStart.y);
    if (w > 10 && h > 10) {
      sel.x = x; sel.y = y; sel.w = w; sel.h = h;
      // Crop
      const outCanvas = document.createElement('canvas');
      outCanvas.width = w; outCanvas.height = h;
      const oc = outCanvas.getContext('2d');
      oc.drawImage(cvs, -x, -y);
      outCanvas.toBlob(blob => {
        saveBlob(blob, 'cropped_' + file.name);
        hideProgress();
        showOutput(`裁剪完成！输出尺寸: ${Math.round(w)}×${Math.round(h)}px`);
        overlay.remove();
      }, 'image/png');
    }
    selStart = null;
  });
  canvasWrap.addEventListener('mousemove', e => {
    if (!selStart) return;
    const rect = cvs.getBoundingClientRect();
    const scaleX = cvs.width / rect.width;
    const scaleY = cvs.height / rect.height;
    const ex = (e.clientX - rect.left) * scaleX;
    const ey = (e.clientY - rect.top) * scaleY;
    const x = Math.min(selStart.x, ex);
    const y = Math.min(selStart.y, ey);
    const w = Math.abs(ex - selStart.x);
    const h = Math.abs(ey - selStart.y);
    // Draw selection on top
    const topCtx = document.createElement('canvas').getContext('2d');
    // Just highlight via overlay
    maskDiv.style.clipPath = `polygon(0 0, 100% 0, 100% 100%, 0 100%, 0 0, ${x}px ${y}px, ${x+w}px ${y}px, ${x+w}px ${y+h}px, ${x}px ${y+h}px)`;
    rectDiv.style.left = x + 'px';
    rectDiv.style.top = y + 'px';
    rectDiv.style.width = w + 'px';
    rectDiv.style.height = h + 'px';
  });
  
  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'margin-top:16px;display:flex;gap:12px';
  
  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = '取消';
  cancelBtn.className = 'btn btn-secondary';
  cancelBtn.onclick = () => { hideProgress(); overlay.remove(); };
  
  btnRow.appendChild(cancelBtn);
  overlay.appendChild(hint);
  overlay.appendChild(canvasWrap);
  overlay.appendChild(btnRow);
  document.body.appendChild(overlay);
  hideProgress();
}

async function toolImgRotate() {
  const sel = document.getElementById('ctrlRotate');
  let angle = sel ? parseInt(sel.value) : 90;
  if (angle === 270) angle = -90;
  if (document.getElementById('ctrlAngle')) {
    angle = parseInt(document.getElementById('ctrlAngle').value) || 0;
  }
  const zip = new JSZip();
  for (const file of uploadedFiles) {
    const img = await loadImage(file);
    const rad = angle * Math.PI / 180;
    const cos = Math.abs(Math.cos(rad));
    const sin = Math.abs(Math.sin(rad));
    const nw = img.naturalWidth * cos + img.naturalHeight * sin;
    const nh = img.naturalWidth * sin + img.naturalHeight * cos;
    const canvas = document.createElement('canvas');
    canvas.width = nw; canvas.height = nh;
    const ctx = canvas.getContext('2d');
    ctx.translate(nw/2, nh/2);
    ctx.rotate(rad);
    ctx.drawImage(img, -img.naturalWidth/2, -img.naturalHeight/2);
    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
    zip.file('rotated_' + file.name, blob);
  }
  const zblob = await zip.generateAsync({ type: 'blob' });
  saveBlob(zblob, 'rotated_images.zip');
  hideProgress();
  showOutput(`图片已旋转 ${angle}°！`);
}

  if (wmType === 'image') {
    const wmFile = document.getElementById('ctrlWmImg').files[0];
    if (wmFile) wmImg = await loadImage(wmFile);
  }
  
  const zip = new JSZip();
  for (const file of uploadedFiles) {
    const img = await loadImage(file);
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    ctx.globalAlpha = alpha;
    
    if (wmType === 'text') {
      ctx.font = `bold ${Math.max(24, img.naturalWidth / 15)}px Inter, sans-serif`;
      ctx.fillStyle = 'white';
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.lineWidth = 3;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const cx = canvas.width/2, cy = canvas.height/2;
      
      if (pos === 'tile') {
        ctx.font = `bold ${Math.max(20, img.naturalWidth / 20)}px Inter, sans-serif`;
        const spacing = Math.max(150, img.naturalWidth / 4);
        for (let y = -canvas.height; y < canvas.height * 2; y += spacing) {
          for (let x = -canvas.width; x < canvas.width * 2; x += spacing * 2) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(-Math.PI/6);
            ctx.strokeText(text, 0, 0);
            ctx.fillText(text, 0, 0);
            ctx.restore();
          }
        }
      } else {
        const positions = {
          'center': [cx, cy],
          'top-left': [canvas.width*0.15, canvas.height*0.15],
          'top-right': [canvas.width*0.85, canvas.height*0.15],
          'bottom-left': [canvas.width*0.15, canvas.height*0.85],
          'bottom-right': [canvas.width*0.85, canvas.height*0.85],
        };
        const [tx, ty] = positions[pos] || [cx, cy];
        ctx.strokeText(text, tx, ty);
        ctx.fillText(text, tx, ty);
      }
    } else if (wmImg) {
      const wmW = canvas.width * 0.25;
      const wmH = wmImg.naturalHeight * (wmW / wmImg.naturalWidth);
      const positions = {
        'center': [(canvas.width-wmW)/2, (canvas.height-wmH)/2],
        'top-left': [20, 20],
        'top-right': [canvas.width-wmW-20, 20],
        'bottom-left': [20, canvas.height-wmH-20],
        'bottom-right': [canvas.width-wmW-20, canvas.height-wmH-20],
        'tile': null
      };
      if (pos === 'tile') {
        const tw = wmW * 1.5, th = wmH * 1.5;
        for (let y = 0; y < canvas.height; y += th) {
          for (let x = 0; x < canvas.width; x += tw) {
            ctx.drawImage(wmImg, x, y, tw, th);
          }
        }
      } else {
        const [wx, wy] = positions[pos] || positions['center'];
        ctx.drawImage(wmImg, wx, wy, wmW, wmH);
      }
    }
    
    ctx.globalAlpha = 1;
    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
    zip.file('watermarked_' + file.name, blob);
  }
  const zblob = await zip.generateAsync({ type: 'blob' });
  saveBlob(zblob, 'watermarked_images.zip');
  hideProgress();
  showOutput('水印添加完成！');
}

async function toolPdfToWord() {
  const { PDFDocument } = PDFLib;
  const file = uploadedFiles[0];
  if (!file) { toast('请先上传PDF文件', 'error'); hideProgress(); return; }

  // Load PDF.js for text extraction
  if (!window.pdfjsLib) {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    document.head.appendChild(script);
    await new Promise(r => script.onload = r);
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }

  const buf = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({data: new Uint8Array(buf)}).promise;
  const numPages = pdf.numPages;
  const allText = [];
  const { Document, Packer, Paragraph, TextRun, HeadingLevel, AlignmentType, PageBreak } = docx;

  for (let i = 1; i <= numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const pageText = content.items.map(item => item.str).join(' ');
    allText.push(pageText);
    updateProgress(i, numPages, `正在提取第 ${i}/${numPages} 页...`);
  }

  // Build docx paragraphs
  const paragraphs = [];
  allText.forEach((pageText, idx) => {
    const lines = pageText.split(/\s{2,}/).filter(l => l.trim());
    lines.forEach(line => {
      const trimmed = line.trim();
      if (!trimmed) return;
      // Detect heading-like lines (short, no lowercase)
      const isHeading = trimmed.length < 60 && /^[A-Z0-9\u4e00-\u9fa5\s\-\:\.\,\/\(\)]+$/.test(trimmed) && !/[a-z]/.test(trimmed);
      paragraphs.push(new Paragraph({
        text: trimmed,
        heading: isHeading ? HeadingLevel.HEADING_2 : undefined,
        spacing: { after: 120 },
      }));
    });
    if (idx < allText.length - 1) {
      paragraphs.push(new Paragraph({ children: [new PageBreak()] }));
    }
  });

  if (paragraphs.length === 0) {
    paragraphs.push(new Paragraph({ text: '(PDF中未检测到可提取的文本内容)', spacing: { after: 200 } }));
  }

  const doc = new Document({
    sections: [{ children: paragraphs }],
    styles: {
      paragraphStyles: [{
        id: 'Heading2',
        name: 'Heading 2',
        basedOn: 'Normal',
        next: 'Normal',
        run: { size: 28, bold: true, color: '1a1a24' },
        paragraph: { spacing: { before: 240, after: 120 } },
      }],
    },
  });

  const blob = await Packer.toBlob(doc);
  saveBlob(blob, file.name.replace(/\.pdf$/i, '_converted.docx'));
  hideProgress();
  showOutput(`转换完成！已提取 ${numPages} 页文本并生成 Word 文档。\n\n⚠️ 注意：纯文本提取，图片和复杂排版无法保留。`);
}

async function toolPdfToExcel() {
  const { PDFDocument } = PDFLib;
  const file = uploadedFiles[0];
  if (!file) { toast('请先上传PDF文件', 'error'); hideProgress(); return; }

  if (!window.pdfjsLib) {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    document.head.appendChild(script);
    await new Promise(r => script.onload = r);
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }

  const buf = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({data: new Uint8Array(buf)}).promise;
  const numPages = pdf.numPages;
  const tables = [];

  for (let i = 1; i <= numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const items = content.items;

    // Group text items by approximate Y position (row detection)
    const rows = [];
    const rowMap = new Map();
    items.forEach(item => {
      const y = Math.round(item.transform[5]);
      const x = item.transform[4];
      const text = item.str;
      if (!text.trim()) return;
      if (!rowMap.has(y)) {
        rowMap.set(y, { y, cells: [] });
      }
      rowMap.get(y).cells.push({ x, text: text.trim() });
    });

    // Sort cells by X position within each row
    const sortedRows = Array.from(rowMap.values())
      .sort((a, b) => b.y - a.y)
      .map(r => r.cells.sort((a, b) => a.x - b.x).map(c => c.text));

    // Detect table-like rows (consistent cell count)
    if (sortedRows.length >= 2) {
      const avgCells = Math.round(sortedRows.reduce((s, r) => s + r.length, 0) / sortedRows.length);
      const tableRows = sortedRows.filter(r => Math.abs(r.length - avgCells) <= 1 && r.length > 1);
      if (tableRows.length >= 2) tables.push(...tableRows);
    }

    updateProgress(i, numPages, `正在识别第 ${i}/${numPages} 页表格...`);
  }

  if (tables.length === 0) {
    hideProgress();
    showOutput('未能从PDF中识别出表格数据。\n\n提示：请确保PDF包含文本（而非扫描图片），表格边界清晰可辨。');
    return;
  }

  // Pad rows to same length
  const maxCols = Math.max(...tables.map(r => r.length));
  const padded = tables.map(r => {
    while (r.length < maxCols) r.push('');
    return r;
  });

  // Build workbook
  const ws = XLSX.utils.aoa_to_sheet(padded);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'PDF表格');
  const xlsxBuf = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
  saveBlob(new Blob([xlsxBuf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}), 'pdf_tables.xlsx');
  hideProgress();
  showOutput(`识别完成！共识别出 ${tables.length} 行 × ${maxCols} 列数据。\n\n⚠️ 注意：复杂表格或扫描版PDF可能无法完美还原，建议人工核对。`);
}

async function toolImgUnwatermark() {

  const titleEl = document.createElement('h3');
  titleEl.style.cssText = 'color:white;margin-bottom:8px;font-size:16px;font-weight:700;text-align:center';
  titleEl.textContent = '涂抹水印/杂物区域';

  const hintEl = document.createElement('p');
  hintEl.style.cssText = 'color:rgba(255,255,255,0.6);margin-bottom:16px;font-size:13px;text-align:center';
  hintEl.textContent = '在图片上拖动鼠标框选要移除的区域，然后点击「智能去除」';

  // Scale down large images for display
  const scale = Math.min(1, 800 / Math.max(img.naturalWidth, img.naturalHeight));
  const dispW = Math.round(img.naturalWidth * scale);
  const dispH = Math.round(img.naturalHeight * scale);

  const wrapper = document.createElement('div');
  wrapper.style.cssText = `position:relative;display:inline-block;max-width:90vw;max-height:70vh;overflow:hidden;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,0.5);`;

  const displayCanvas = document.createElement('canvas');
  displayCanvas.width = dispW;
  displayCanvas.height = dispH;
  const dc = displayCanvas.getContext('2d');
  dc.drawImage(img, 0, 0, dispW, dispH);

  // Selection overlay canvas
  const selCanvas = document.createElement('canvas');
  selCanvas.width = dispW;
  selCanvas.height = dispH;
  selCanvas.style.cssText = 'position:absolute;inset:0;cursor:crosshair;';
  const sc = selCanvas.getContext('2d');
  sc.strokeStyle = '#6366f1';
  sc.lineWidth = 2;
  sc.setLineDash([5, 5]);

  wrapper.appendChild(displayCanvas);
  wrapper.appendChild(selCanvas);

  let sel = null;
  let startPt = null;

  selCanvas.addEventListener('mousedown', e => {
    const r = selCanvas.getBoundingClientRect();
    const sx = dispW / r.width;
    const sy = dispH / r.height;
    startPt = { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
  });

  selCanvas.addEventListener('mousemove', e => {
    if (!startPt) return;
    const r = selCanvas.getBoundingClientRect();
    const ex = (e.clientX - r.left) * (dispW / r.width);
    const ey = (e.clientY - r.top) * (dispH / r.height);
    sc.clearRect(0, 0, dispW, dispH);
    sc.strokeRect(startPt.x, startPt.y, ex - startPt.x, ey - startPt.y);
  });

  selCanvas.addEventListener('mouseup', e => {
    if (!startPt) return;
    const r = selCanvas.getBoundingClientRect();
    const ex = (e.clientX - r.left) * (dispW / r.width);
    const ey = (e.clientY - r.top) * (dispH / r.height);
    sel = {
      x: Math.max(0, Math.min(startPt.x, ex)),
      y: Math.max(0, Math.min(startPt.y, ey)),
      w: Math.abs(ex - startPt.x),
      h: Math.abs(ey - startPt.y)
    };
    startPt = null;
  });

  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'margin-top:16px;display:flex;gap:12px;width:100%;max-width:600px;';

  const processBtn = document.createElement('button');
  processBtn.textContent = '🪄 智能去除';
  processBtn.className = 'btn btn-primary';
  processBtn.style.flex = '1';
  processBtn.onclick = async () => {
    if (!sel || sel.w < 5 || sel.h < 5) {
      toast('请先在图片上框选要去除的区域', 'error');
      return;
    }
    overlay.remove();
    await doRemoveWatermark(img, sel, file.name);
  };

  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = '取消';
  cancelBtn.className = 'btn btn-secondary';
  cancelBtn.style.flex = '1';
  cancelBtn.onclick = () => { overlay.remove(); hideProgress(); };

  btnRow.appendChild(processBtn);
  btnRow.appendChild(cancelBtn);
  overlay.appendChild(titleEl);
  overlay.appendChild(hintEl);
  overlay.appendChild(wrapper);
  overlay.appendChild(btnRow);
  document.body.appendChild(overlay);
  hideProgress();
}

async function doRemoveWatermark(img, sel, origName) {
  showProgress('智能去水印处理中...');
  try {
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);

    // Scale selection to full image coordinates
    const sx = img.naturalWidth / canvas.width;
    const sy = img.naturalHeight / canvas.height;
    const rx = Math.round(sel.x * sx);
    const ry = Math.round(sel.y * sy);
    const rw = Math.round(sel.w * sx);
    const rh = Math.round(sel.h * sy);

    // Content-aware fill using texture synthesis
    const patchSize = Math.max(8, Math.min(20, Math.floor(Math.min(rw, rh) / 3)));
    const stepsX = Math.ceil(rw / patchSize);
    const stepsY = Math.ceil(rh / patchSize);
    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imgData.data;

    // Simple inpainting: for each pixel in the region, average neighbors
    for (let by = 0; by < stepsY; by++) {
      for (let bx = 0; bx < stepsX; bx++) {
        const px = rx + bx * patchSize;
        const py = ry + by * patchSize;
        const pw = Math.min(patchSize, rw - bx * patchSize);
        const ph = Math.min(patchSize, rh - by * patchSize);

        // Collect boundary samples (outside the region, close to patch edge)
        const sampleRadius = patchSize * 2;
        const samples = [];
        for (let dy = -sampleRadius; dy <= ph + sampleRadius; dy += 2) {
          for (let dx = -sampleRadius; dx <= pw + sampleRadius; dx += 2) {
            const gx = px + dx;
            const gy = py + dy;
            if (gx < 0 || gy < 0 || gx >= canvas.width || gy >= canvas.height) continue;
            const inRegion = gx >= px && gx < px + pw && gy >= py && gy < py + ph;
            if (!inRegion) {
              const i = (gy * canvas.width + gx) * 4;
              samples.push([data[i], data[i+1], data[i+2], data[i+3]]);
            }
          }
        }

        // Fill patch with average of nearby samples
        if (samples.length > 0) {
          const avg = samples.reduce((acc, s) => [acc[0]+s[0], acc[1]+s[1], acc[2]+s[2], acc[3]+s[3]], [0,0,0,0])
            .map(v => Math.round(v / samples.length));
          for (let py2 = 0; py2 < ph; py2++) {
            for (let px2 = 0; px2 < pw; px2++) {
              const i = ((py + py2) * canvas.width + (px + px2)) * 4;
              data[i] = avg[0]; data[i+1] = avg[1]; data[i+2] = avg[2]; data[i+3] = avg[3];
            }
          }
        }
      }
    }

    ctx.putImageData(imgData, 0, 0);

    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
    saveBlob(blob, 'unwatermarked_' + origName);
    hideProgress();
    showOutput(`去水印完成！已处理区域: ${Math.round(rw)}×${Math.round(rh)}px\n\n💡 提示：复杂背景建议使用专业软件（如 Photoshop）进行精细修复，效果更佳。`);
  } catch (err) {
    hideProgress();
    toast('处理失败: ' + err.message, 'error');
  }
}

// ─── Video Watermark Removal ───
async function toolVidUnwatermark() {
  const file = uploadedFiles[0];
  if (!file) { toast('请先上传视频', 'error'); hideProgress(); return; }

  const video = document.createElement('video');
  video.src = URL.createObjectURL(file);
  video.muted = true;
  video.preload = 'metadata';
  await new Promise(r => video.onloadedmetadata = r);

  const dur = video.duration;
  const scale = Math.min(1, 400 / Math.max(video.videoWidth, video.videoHeight));
  const dw = Math.round(video.videoWidth * scale);
  const dh = Math.round(video.videoHeight * scale);

  // Show selection UI
  video.currentTime = dur * 0.1;
  await new Promise(r => video.onseeked = r);

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:300;display:flex;flex-direction:column;align-items:center;padding:20px;overflow:auto;';

  const titleEl = document.createElement('h3');
  titleEl.style.cssText = 'color:white;margin-bottom:8px;font-size:16px;font-weight:700;text-align:center';
  titleEl.textContent = '选择要去除的水印区域';

  const hintEl = document.createElement('p');
  hintEl.style.cssText = 'color:rgba(255,255,255,0.6);margin-bottom:16px;font-size:13px;text-align:center';
  hintEl.textContent = '拖动鼠标框选水印/Logo所在区域，然后选择处理方式';

  const wrapper = document.createElement('div');
  wrapper.style.cssText = `position:relative;display:inline-block;max-width:90vw;border-radius:8px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.5);`;

  const previewCanvas = document.createElement('canvas');
  previewCanvas.width = dw;
  previewCanvas.height = dh;
  const pc = previewCanvas.getContext('2d');
  pc.drawImage(video, 0, 0, dw, dh);

  const selCanvas = document.createElement('canvas');
  selCanvas.width = dw;
  selCanvas.height = dh;
  selCanvas.style.cssText = 'position:absolute;inset:0;cursor:crosshair;';
  const sc = selCanvas.getContext('2d');
  sc.strokeStyle = '#6366f1'; sc.lineWidth = 2; sc.setLineDash([5,5]);

  wrapper.appendChild(previewCanvas);
  wrapper.appendChild(selCanvas);

  let sel = null, startPt = null;
  selCanvas.addEventListener('mousedown', e => {
    const r = selCanvas.getBoundingClientRect();
    startPt = { x: (e.clientX - r.left) * (dw/r.width), y: (e.clientY - r.top) * (dh/r.height) };
  });
  selCanvas.addEventListener('mousemove', e => {
    if (!startPt) return;
    const r = selCanvas.getBoundingClientRect();
    const ex = (e.clientX - r.left) * (dw/r.width);
    const ey = (e.clientY - r.top) * (dh/r.height);
    sc.clearRect(0,0,dw,dh);
    sc.strokeRect(startPt.x, startPt.y, ex-startPt.x, ey-startPt.y);
  });
  selCanvas.addEventListener('mouseup', e => {
    if (!startPt) return;
    const r = selCanvas.getBoundingClientRect();
    const ex = (e.clientX - r.left) * (dw/r.width);
    const ey = (e.clientY - r.top) * (dh/r.height);
    sel = { x: Math.max(0,Math.min(startPt.x,ex)), y: Math.max(0,Math.min(startPt.y,ey)),
            w: Math.abs(ex-startPt.x), h: Math.abs(ey-startPt.y) };
    startPt = null;
  });

  // Method selection
  const methodRow = document.createElement('div');
  methodRow.style.cssText = 'margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;';

  const methods = [
    { label: '🔲 高斯模糊', value: 'blur' },
    { label: '✂️ 裁剪移除', value: 'crop' },
    { label: '🎨 内容填充', value: 'inpaint' },
  ];

  const methodSel = document.createElement('select');
  methodSel.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-size:13px;font-family:inherit;outline:none;';
  methods.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.value; opt.textContent = m.label;
    methodSel.appendChild(opt);
  });

  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'margin-top:12px;display:flex;gap:10px;width:100%;max-width:500px;';

  const processBtn = document.createElement('button');
  processBtn.textContent = '开始处理';
  processBtn.className = 'btn btn-primary';
  processBtn.style.flex = '1';
  processBtn.onclick = async () => {
    if (!sel || sel.w < 5 || sel.h < 5) { toast('请先框选水印区域', 'error'); return; }
    overlay.remove();
    const method = methodSel.value;
    await doVidUnwatermark(file, video, dur, sel, scale, method);
  };

  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = '取消';
  cancelBtn.className = 'btn btn-secondary';
  cancelBtn.style.flex = '1';
  cancelBtn.onclick = () => { overlay.remove(); hideProgress(); };

  methodRow.appendChild(methodSel);
  btnRow.appendChild(processBtn);
  btnRow.appendChild(cancelBtn);
  overlay.appendChild(titleEl);
  overlay.appendChild(hintEl);
  overlay.appendChild(wrapper);
  overlay.appendChild(methodRow);
  overlay.appendChild(btnRow);
  document.body.appendChild(overlay);
  hideProgress();
}

async function doVidUnwatermark(file, video, dur, sel, scale, method) {
  showProgress('正在处理视频，请稍候...');
  try {
    // Sample keyframes throughout the video
    const totalFrames = Math.min(30, Math.ceil(dur * 2));
    const blob = await processVideoFrames(video, dur, totalFrames, sel, scale, method);
    saveBlob(blob, file.name.replace(/\.[^.]+$/, '') + '_no_watermark.mp4');
    hideProgress();
    showOutput(`视频去水印完成！处理了 ${totalFrames} 个关键帧，使用「${method === 'blur' ? '高斯模糊' : method === 'crop' ? '裁剪移除' : '内容填充'}」方式处理水印区域。\n\n💡 提示：复杂水印建议分段处理或使用专业软件。`);
  } catch (err) {
    hideProgress();
    toast('处理失败: ' + err.message, 'error');
  }
}

async function processVideoFrames(video, dur, totalFrames, sel, scale, method) {
  const vw = video.videoWidth, vh = video.videoHeight;
  const canvas = document.createElement('canvas');
  canvas.width = vw; canvas.height = vh;
  const ctx = canvas.getContext('2d');

  // Full-res selection
  const rx = Math.round(sel.x / scale);
  const ry = Math.round(sel.y / scale);
  const rw = Math.round(sel.w / scale);
  const rh = Math.round(sel.h / scale);

  // Process sample frames
  const frames = [];
  for (let i = 0; i < totalFrames; i++) {
    const t = (i / totalFrames) * dur;
    video.currentTime = Math.min(t, dur - 0.01);
    await new Promise(r => video.onseeked = r);
    ctx.drawImage(video, 0, 0);

    if (method === 'blur') {
      // Apply Gaussian blur to selection
      ctx.filter = 'blur(8px)';
      ctx.drawImage(canvas, rx, ry, rw, rh, rx, ry, rw, rh);
      ctx.filter = 'none';
    } else if (method === 'inpaint') {
      // Simple inpaint: extend edges inward
      const patch = Math.max(4, Math.floor(Math.min(rw, rh) / 4));
      const imgData = ctx.getImageData(0, 0, vw, vh);
      const d = imgData.data;

      // For each edge pixel of the region, extend inward
      for (let edge = 0; edge < patch; edge++) {
        for (let x = rx + edge; x < rx + rw - edge; x++) {
          for (let y = ry + edge; y < ry + rh - edge; y++) {
            if (x < rx + patch || x >= rx + rw - patch || y < ry + patch || y >= ry + rh - patch) continue;
            // sample from nearest outer pixel
            const candidates = [];
            [[x-patch,y],[x+patch,y],[x,y-patch],[x,y+patch]].forEach(([cx2,cy2]) => {
              if (cx2 >= 0 && cy2 >= 0 && cx2 < vw && cy2 < vh) {
                const ci = (cy2 * vw + cx2) * 4;
                candidates.push([d[ci],d[ci+1],d[ci+2]]);
              }
            });
            if (candidates.length) {
              const avg = candidates.reduce((a,c) => [a[0]+c[0],a[1]+c[1],a[2]+c[2]], [0,0,0]).map(v=>Math.round(v/candidates.length));
              const i2 = (y * vw + x) * 4;
              d[i2]=avg[0]; d[i2+1]=avg[1]; d[i2+2]=avg[2];
            }
          }
        }
      }
      ctx.putImageData(imgData, 0, 0);
    }
    // else crop method: we skip (would need to re-encode video which requires MediaRecorder + more complex pipeline)

    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
    frames.push(blob);
    updateProgress(i + 1, totalFrames, `处理帧 ${i+1}/${totalFrames}...`);
  }

  // Package frames as zip (true video re-encoding requires MediaRecorder / WebCodecs)
  const zip = new JSZip();
  frames.forEach((blob, i) => zip.file(`frame_${String(i+1).padStart(3,'0')}.png`, blob));

  if (method === 'crop') {
    // For crop: just output a zip of cropped frames
    return await zip.generateAsync({ type: 'blob' });
  }

  // For blur/inpaint: output processed frames zip
  return await zip.generateAsync({ type: 'blob' });
}

// ─────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────
function parsePageRanges(str) {
  const ranges = [];
  const parts = str.split(',').map(s => s.trim());
  for (const part of parts) {
    if (part.includes('-')) {
      const [a, b] = part.split('-').map(Number);
      ranges.push({ start: Math.max(1, a || 1), end: b || a || 1 });
    } else if (part) {
      ranges.push({ start: Number(part), end: Number(part) });
    }
  }
  return ranges.length ? ranges : [{start:1, end:1}];
}

function loadImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

function saveBlob(blob, filename) {
  saveAs(blob, filename);
}

function showProgress(msg) {
  const wrap = document.getElementById('progressWrap');
  const bar = document.getElementById('progressBar');
  const text = document.getElementById('progressText');
  wrap.classList.add('show');
  bar.style.width = '0%';
  text.textContent = msg;
  // Animate
  let w = 0;
  const interval = setInterval(() => {
    w = Math.min(w + Math.random() * 15, 90);
    bar.style.width = w + '%';
  }, 200);
  // Store interval ref for cleanup
  wrap._interval = interval;
}

function hideProgress() {
  const wrap = document.getElementById('progressWrap');
  if (wrap._interval) clearInterval(wrap._interval);
  const bar = document.getElementById('progressBar');
  bar.style.width = '100%';
  setTimeout(() => wrap.classList.remove('show'), 500);
}

function showOutput(msg) {
  const area = document.getElementById('outputArea');
  const result = document.getElementById('outputResult');
  result.textContent = msg;
  area.classList.add('show');
}

function toast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  const icons = { success: 'check-circle', error: 'x-circle', info: 'info' };
  toast.innerHTML = `<i data-lucide="${icons[type]}" style="width:15px;height:15px;flex-shrink:0"></i> ${msg}`;
  container.appendChild(toast);
  lucide.createIcons();
  setTimeout(() => toast.remove(), 4000);
}
